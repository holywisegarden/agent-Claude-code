name: Jack and Blaze Daily Blog Engine

on:
  schedule:
    - cron: '0 8 * * *'  # Every day at 8:00 AM UTC (3 AM CDT)
  workflow_dispatch:

jobs:
  publish-blog-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests python-dotenv feedparser

      - name: Run blog automation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          BLOGGER_EMAIL: elmo00086.books@blogger.com
        run: python blogger-automation.py

      - name: Commit and push blog logs
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Jack and Blaze Bot"
          git add blog-log.md blog-posts/ blog-derivatives/ || true
          git diff --staged --quiet || git commit -m "Auto blog post: $(date '+%Y-%m-%d')"
          git push || true
