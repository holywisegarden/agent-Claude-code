name: Jack and Blaze Auto-Approver + Post Scheduler

on:
  schedule:
    # Monday 2pm UTC = 6hrs after 8am content generation
    - cron: '0 14 * * 1'
    # Friday 2pm UTC = 6hrs after 8am Friday author posts
    - cron: '0 14 * * 5'
    # Saturday 2pm UTC = 6hrs after 8am Saturday coworker
    - cron: '0 14 * * 6'
  workflow_dispatch:  # Manual trigger any time

jobs:
  auto-approve-and-schedule:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests python-dotenv

      - name: Run post scheduler (reads Slack approvals + calls Late API)
        env:
          LATE_API_KEY: ${{ secrets.LATE_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          FAST_IO_API_KEY: ${{ secrets.FAST_IO_API_KEY }}
        run: python post-scheduler.py

      - name: Commit publish logs
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Jack and Blaze Bot"
          git add publish-log-*.md approvals.md draft-send-log.md || true
          git diff --staged --quiet || git commit -m "Publish log: $(date '+%Y-%m-%d')"
          git push || true
