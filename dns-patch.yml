name: Pipeline Health Check

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Confirm pipeline files exist
        run: |
          echo "Checking pipeline files..."
          [ -f blogger-automation.py ] && echo "✅ blogger-automation.py" || echo "❌ blogger-automation.py missing"
          [ -f post-scheduler.py ]     && echo "✅ post-scheduler.py"     || echo "❌ post-scheduler.py missing"
          [ -f saturday-coworker.py ]  && echo "✅ saturday-coworker.py"  || echo "❌ saturday-coworker.py missing"
          [ -f sunday-review.py ]      && echo "✅ sunday-review.py"      || echo "❌ sunday-review.py missing"
          echo "Health check complete."
